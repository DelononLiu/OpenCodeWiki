<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenCodeWiki</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#f5f5f7;
--surface:#fff;
--sidebar-bg:#f0f0f2;
--border:#e5e7eb;
--text:#111;
--text2:#555;
--text3:#888;
--blue:#007aff;
--tag-bg:#e8e8ec;
--input-bg:#f7f7f9;
}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex}

/* Layout */
.sidebar{width:280px;flex-shrink:0;background:var(--sidebar-bg);display:flex;flex-direction:column;border-right:1px solid var(--border);height:100vh;transition:width .25s ease,padding .25s ease}
.sidebar-header{display:flex;align-items:center;gap:10px;padding:16px 16px 12px;min-height:52px}
.sidebar-logo{font-size:16px;font-weight:700;color:var(--blue);flex:1}
.sidebar-list{flex:1;overflow-y:auto;padding:0 8px}
.sidebar-item{display:block;padding:10px 12px;border-radius:8px;text-decoration:none;color:var(--text);font-size:14px;line-height:1.4;cursor:pointer;transition:background .15s;margin-bottom:2px}
.sidebar-group{font-size:11px;font-weight:600;color:var(--text3);padding:12px 12px 4px;text-transform:uppercase;letter-spacing:.04em}
.sidebar-item:hover{background:var(--tag-bg)}
.sidebar-item-summary{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sidebar-item-time{font-size:11px;color:var(--text3);margin-top:2px}
.sidebar-empty{font-size:12px;color:var(--text3);padding:12px;text-align:center}

/* Main area */
.main{flex:1;display:flex;flex-direction:column;align-items:center;padding:25vh 40px 0;min-width:0;overflow-y:auto}
.qa-box{max-width:640px;width:100%;margin:0 auto}
.qa-welcome{text-align:center;margin-bottom:16px;position:relative;top:-40px}
.qa-welcome-title{font-size:28px;font-weight:700;color:var(--blue);letter-spacing:-.02em}
.qa-welcome-sub{font-size:13px;color:var(--text3);font-weight:400;letter-spacing:normal}
.repo-section{width:800px;margin:0 auto;flex-shrink:0}
.qa-input-wrap{display:flex;align-items:flex-end;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:10px 16px;transition:box-shadow .2s;box-shadow:0 2px 8px rgba(0,0,0,.04)}

.qa-input-wrap:focus-within{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,122,255,.18)}
.qa-input-wrap textarea{flex:1;border:none;background:transparent;outline:none;font-size:16px;color:var(--text);resize:none;overflow:hidden;padding:3px 0;line-height:1.6;min-height:56px;font-family:inherit}
.qa-input-wrap textarea::placeholder{color:#aaa}
.qa-input-wrap button{padding:8px 22px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer}
.qa-input-wrap button:hover{opacity:.88}
.qa-input-wrap button:disabled{opacity:.35;cursor:not-allowed}
.qa-input-wrap textarea::-webkit-scrollbar{width:4px}
.qa-input-wrap textarea::-webkit-scrollbar-thumb{background:var(--text3);border-radius:2px}
.qa-input-wrap textarea::-webkit-scrollbar-button{display:none}
.qa-examples{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:10px}
.qa-examples button{padding:5px 12px;border:1px solid var(--border);border-radius:16px;background:var(--surface);font-size:12px;color:var(--text3);cursor:pointer}
.qa-examples button:hover{border-color:var(--blue);color:var(--blue)}
.divider{height:1px;background:var(--border);margin:20px auto;width:800px;flex-shrink:0}
.repo-grid{display:grid;grid-template-columns:1fr;gap:10px;width:100%}
@media(min-width:640px){.repo-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:900px){.repo-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:1200px){.repo-grid{grid-template-columns:repeat(4,1fr)}}
.repo-card{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:12px;border:1px solid var(--border);background:var(--surface);cursor:pointer;text-decoration:none;color:inherit;transition:all .15s;height:100%}
.repo-card:hover{border-color:#d0d0d5;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.repo-card-icon{width:14px;height:14px;color:#bbb;flex-shrink:0}
.repo-card-info{min-width:0;flex:1}
.repo-card-name{font-size:14px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.repo-card-stats{display:flex;flex-wrap:wrap;gap:6px;margin-top:2px;font-size:11px;color:var(--text3)}
.add-card{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:12px;border:1px dashed #d0d0d5;background:var(--surface);cursor:pointer;text-decoration:none;color:inherit;transition:all .15s;height:100%}
.add-card:hover{border-color:var(--blue)}
.add-card-icon{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--tag-bg);flex-shrink:0}
.add-card-text{font-size:13px;color:var(--text3)}
.empty-state{text-align:center;padding:32px 20px;font-size:13px;color:var(--text3)}

/* Floating app icon */
.app-icon{position:fixed;top:14px;left:14px;z-index:100;width:24px;height:24px;cursor:pointer;color:var(--text3);transition:left .2s ease;background:none;border:none;padding:0}
.app-icon:hover{color:var(--text)}
.loading-state{text-align:center;padding:32px 20px;font-size:13px;color:var(--text3)}
.fade-in{animation:fadeIn .3s ease-out both}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<button class="app-icon" id="appIcon" onclick="toggleSidebar()" title="切换侧边栏">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M12.8311 1.67383C14.7468 1.71287 16.493 1.88034 17.9043 2.06934C20.0999 2.36353 21.7899 4.04161 22.0908 6.23633C22.3072 7.81681 22.4951 9.81754 22.4951 12.001L22.4863 12.8105C22.4475 14.6772 22.2802 16.381 22.0908 17.7637L22.0586 17.9678C21.6839 20.0619 20.0314 21.6457 17.9043 21.9307L17.2793 22.0098C15.7757 22.1906 13.9611 22.335 12 22.335L11.1689 22.3262C9.52677 22.2927 8.0095 22.1647 6.7207 22.0098L6.0957 21.9307C3.96847 21.6457 2.31512 20.062 1.94043 17.9678L1.9082 17.7637C1.71887 16.381 1.55253 14.6772 1.51367 12.8105L1.50488 12.001C1.50488 9.81755 1.69179 7.81681 1.9082 6.23633C2.20909 4.0415 3.89993 2.36347 6.0957 2.06934C7.70871 1.85334 9.75883 1.66504 12 1.66504L12.8311 1.67383ZM12 3.26465C11.1519 3.26465 10.3313 3.29392 9.55273 3.34082V20.6582C10.3313 20.7051 11.1519 20.7354 12 20.7354C14.1542 20.7353 16.1312 20.5537 17.6914 20.3447C19.1775 20.1457 20.3032 19.0244 20.5059 17.5459C20.7148 16.0197 20.8945 14.0952 20.8945 12.001C20.8945 9.90634 20.7149 7.9805 20.5059 6.4541C20.3032 4.97563 19.1775 3.85428 17.6914 3.65527C16.1312 3.44635 14.1542 3.26465 12 3.26465ZM7.95312 3.4668C7.36648 3.52363 6.81548 3.5874 6.30859 3.65527C4.82252 3.85428 3.69678 4.97563 3.49414 6.4541C3.28514 7.9805 3.10449 9.90633 3.10449 12.001C3.10455 14.0952 3.28518 16.0197 3.49414 17.5459C3.69678 19.0244 4.82251 20.1457 6.30859 20.3447C6.81545 20.4126 7.36652 20.4754 7.95312 20.5322V3.4668Z" fill="currentColor"></path></svg>
</button>

<div class="sidebar" id="qaSidebar">
  <div class="sidebar-header">
    <span class="sidebar-logo">OpenCodeWiki</span>
  </div>
  <div class="sidebar-list" id="sidebarList">
    <div class="sidebar-empty">Loading...</div>
  </div>
</div>

<div class="main" id="mainArea">
  <div class="qa-box">
    <div class="qa-welcome">
      <div class="qa-welcome-title">OpenCodeWiki <span class="qa-welcome-sub">/ 你的代码智能问答助手</span></div>
    </div>
    <div class="qa-input-wrap">
      <textarea id="qaInput" rows="1" placeholder="输入代码库相关问题..." autocomplete="off"></textarea>
      <button id="qaAskBtn" disabled>Ask</button>
    </div>
    <div class="qa-examples">
      <button onclick="askExample('auth service 的影响范围')">auth service 的影响范围</button>
      <button onclick="askExample('kcode 和 opencodewiki 如何集成')">kcode 和 opencodewiki 如何集成</button>
      <button onclick="askExample('Explain the project architecture')">Project architecture</button>
      <button onclick="askExample('How does the data flow work?')">Data flow</button>
    </div>
  </div>
  <div class="divider" id="repoDivider" style="display:none"></div>
  <div class="repo-section">
  <div id="repoGrid" class="repo-grid"></div>
  </div>
  <div id="loadingState" class="loading-state" style="display:none"><p>Loading repositories...</p></div>
  <div id="emptyState" class="empty-state" style="display:none"><p>No repositories found.</p></div>
</div>

<div class="redirect-overlay" id="redirectOverlay" style="display:none;position:fixed;inset:0;z-index:100;background:rgba(255,255,255,.7);backdrop-filter:blur(4px);align-items:center;justify-content:center;flex-direction:column;gap:12px">
  <div style="width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite"></div>
  <span style="font-size:14px;color:var(--text3)">Redirecting to Q&A...</span>
</div>

<style>@keyframes spin{to{transform:rotate(360deg)}}</style>

<script>
let repos = [];
const qaInput = document.getElementById('qaInput');
const qaAskBtn = document.getElementById('qaAskBtn');
const repoGrid = document.getElementById('repoGrid');
const loadingState = document.getElementById('loadingState');
const emptyState = document.getElementById('emptyState');
const repoDivider = document.getElementById('repoDivider');
const redirectOverlay = document.getElementById('redirectOverlay');

qaInput.addEventListener('input', function() { qaAskBtn.disabled = !this.value.trim(); autoResize(this); });
qaInput.addEventListener('keydown', function(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (this.value.trim()) submitQa(); } });
qaAskBtn.addEventListener('click', submitQa);

function autoResize(el) { el.style.height = 'auto'; var sh = el.scrollHeight; el.style.height = Math.min(sh, 120) + 'px'; el.style.overflowY = sh > 120 ? 'auto' : 'hidden'; }
function escapeHtml(str) { var d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

function submitQa() {
  var q = qaInput.value.trim();
  if (!q) return;
  redirectOverlay.style.display = 'flex';
  setTimeout(function() { location.href = '/qa?q=' + encodeURIComponent(q); }, 150);
}

function askExample(text) { qaInput.value = text; qaAskBtn.disabled = false; autoResize(qaInput); qaInput.focus(); }

function toggleSidebar() {
  var sidebar = document.getElementById('qaSidebar');
  var icon = document.getElementById('appIcon');
  sidebar.classList.toggle('collapsed');
  if (sidebar.classList.contains('collapsed')) {
    sidebar.style.transition = 'none';
    sidebar.style.overflow = 'hidden';
    sidebar.style.borderRight = 'none';
    sidebar.style.width = '0';
    sidebar.style.padding = '0';
    icon.style.transition = 'none';
    icon.style.left = '14px';
    setTimeout(function() { sidebar.style.transition = ''; icon.style.transition = ''; }, 50);
  } else {
    sidebar.style.transition = '';
    sidebar.style.overflow = '';
    sidebar.style.borderRight = '';
    sidebar.style.width = '280px';
    sidebar.style.padding = '';
    icon.style.transition = 'none';
    icon.style.left = '294px';
    setTimeout(function() { icon.style.transition = ''; }, 50);
  }
}

function formatTime(isoStr) {
  var d = new Date(isoStr), now = new Date(), diff = now - d, m = Math.floor(diff / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return m + 'm ago';
  var h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  var days = Math.floor(h / 24);
  if (days < 30) return days + 'd ago';
  return d.toLocaleDateString();
}

function getTimeGroup(isoStr) {
  var d = new Date(isoStr);
  var now = new Date();
  var today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  var dDate = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  var diffDays = Math.floor((today.getTime() - dDate.getTime()) / 86400000);

  if (diffDays === 0) return '今天';
  if (diffDays < 7) return '本周';

  var monthKey = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
  return monthKey;
}

async function loadLatestSessions() {
  var listEl = document.getElementById('sidebarList');
  try {
    var resp = await fetch('/api/qa/sessions/latest');
    if (!resp.ok) throw new Error('Failed');
    var sessions = await resp.json();
    if (!sessions || sessions.length === 0) {
      listEl.innerHTML = '<div class="sidebar-empty">尚无问答记录</div>';
      return;
    }
    var groups = {};
    for (var i = 0; i < sessions.length; i++) {
      var s = sessions[i];
      var grp = getTimeGroup(s.updatedAt);
      if (!groups[grp]) groups[grp] = [];
      groups[grp].push(s);
    }
    var groupOrder = ['今天', '本周'];
    var html = '';
    for (var gi = 0; gi < groupOrder.length; gi++) {
      var g = groupOrder[gi];
      if (groups[g]) {
        html += '<div class="sidebar-group">' + g + '</div>';
        for (var j = 0; j < groups[g].length; j++) {
          html += renderSidebarItem(groups[g][j]);
        }
        delete groups[g];
      }
    }
    var remaining = Object.keys(groups).sort().reverse();
    for (var ri = 0; ri < remaining.length; ri++) {
      var g = remaining[ri];
      html += '<div class="sidebar-group">' + g + '</div>';
      for (var j = 0; j < groups[g].length; j++) {
        html += renderSidebarItem(groups[g][j]);
      }
    }
    listEl.innerHTML = html;
  } catch { listEl.innerHTML = '<div class="sidebar-empty">加载失败</div>'; }
}

function renderSidebarItem(s) {
  return '<a class="sidebar-item" href="/qa/' + encodeURIComponent(s.id) + '">' +
    '<div class="sidebar-item-summary">' + escapeHtml(s.summary) + '</div></a>';
}

async function fetchRepos() {
  var resp = await fetch('/api/repos');
  if (!resp.ok) throw new Error('Server returned ' + resp.status);
  return resp.json();
}

async function loadRepos() {
  loadingState.style.display = 'block';
  repoGrid.style.display = 'none';
  emptyState.style.display = 'none';
  repoDivider.style.display = 'none';
  try {
    repos = (await fetchRepos()) || [];
    renderGrid();
  } catch { loadingState.style.display = 'none'; emptyState.style.display = 'block'; emptyState.innerHTML = '<p>Could not connect to server.</p>'; }
}

function renderGrid() {
  loadingState.style.display = 'none';
  if (repos.length === 0) {
    repoGrid.style.display = 'none';
    emptyState.style.display = 'block';
    emptyState.innerHTML = '<p>No repositories found.</p>';
    return;
  }
  emptyState.style.display = 'none';
  repoDivider.style.display = 'block';
  repoGrid.style.display = 'grid';
  var html = '<div class="fade-in"><div class="add-card" onclick="toggleAnalyzer()"><div class="add-card-icon">+</div><div class="add-card-text">Add repo</div></div></div>';
  for (var i = 0; i < repos.length; i++) {
    var r = repos[i], stats = r.stats || {};
    html += '<div class="fade-in"><a href="/' + encodeURIComponent(r.name) + '" class="repo-card">';
    html += '<svg class="repo-card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 3v12"/><path d="M18 9a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/><path d="M6 21a3 3 0 1 0 0-6 3 3 0 0 0 6z"/><path d="M15 6a9 9 0 0 0-9 9"/></svg>';
    html += '<div class="repo-card-info"><div class="repo-card-name">' + escapeHtml(r.name) + '</div>';
    html += '<div class="repo-card-stats">';
    if (stats.files != null) html += '<span>' + stats.files.toLocaleString() + ' files</span>';
    if (stats.nodes != null) html += '<span>' + stats.nodes.toLocaleString() + ' symbols</span>';
    html += '</div></div></a></div>';
  }
  repoGrid.innerHTML = html;
}

function toggleAnalyzer() {}

document.getElementById('appIcon').style.left = '14px';
document.getElementById('qaSidebar').style.width = '0';
document.getElementById('qaSidebar').style.padding = '0';
document.getElementById('qaSidebar').style.overflow = 'hidden';
document.getElementById('qaSidebar').style.borderRight = 'none';
document.getElementById('qaSidebar').classList.add('collapsed');
loadRepos();
loadLatestSessions();
</script>

</body>
</html>
