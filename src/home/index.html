<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenCodeWiki</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#f5f5f7;
--surface:#fff;
--border:#e5e7eb;
--text:#111;
--text2:#555;
--text3:#888;
--blue:#007aff;
--tag-bg:#e8e8ec;
--input-bg:#f7f7f9;
}
/* USER_BAR_CSS */
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* Main area */
.main{display:flex;flex-direction:column;align-items:center;padding:12vh 40px 0;min-height:100vh;overflow-y:auto}
.qa-box{max-width:680px;width:100%;margin:0 auto}
.qa-welcome{text-align:center;margin-bottom:16px}
.qa-welcome-title{font-size:28px;font-weight:700;color:var(--blue);letter-spacing:-.02em}
.qa-welcome-sub{font-size:13px;color:var(--text3);font-weight:400;letter-spacing:normal}
.repo-section{width:800px;margin:0 auto;flex-shrink:0}
/* QA_INPUT_CSS */
.home-file-chip{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:12px;font-size:11px;background:var(--tag-bg);color:var(--text2);max-width:180px}
.home-file-chip .name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100px}
.home-file-chip .size{color:var(--text3);font-size:10px}
.home-file-chip .rm{background:none;border:none;cursor:pointer;color:var(--text3);padding:0;font-size:12px;line-height:1}
.qa-examples{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:10px}
.qa-examples button{padding:5px 12px;border:1px solid var(--border);border-radius:16px;background:var(--surface);font-size:12px;color:var(--text3);cursor:pointer}
.qa-examples button:hover{border-color:var(--blue);color:var(--blue)}
.divider{height:1px;background:var(--border);margin:20px auto;width:800px;flex-shrink:0}

/* Team activity */
.team-activity{width:800px;margin:24px auto 0;flex-shrink:0;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 20px;display:none}
.activity-header{font-size:13px;font-weight:600;color:var(--text3);margin-bottom:12px;letter-spacing:.02em}
.activity-body{display:flex;flex-direction:column;gap:10px}
.activity-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;background:var(--bg);font-size:13px;color:var(--text);text-decoration:none;transition:background .1s}
.activity-row:hover{background:var(--tag-bg)}
.activity-icon{font-size:15px;flex-shrink:0}
.activity-text{flex:1}
.activity-meta{font-size:11px;color:var(--text3);flex-shrink:0}

.activity-skeleton{display:flex;gap:10px;padding:8px 10px}
.activity-skeleton .sk{height:14px;border-radius:6px;background:var(--tag-bg);animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}

/* Repo grid */
.repo-grid{display:grid;grid-template-columns:1fr;gap:10px;width:100%}
@media(min-width:640px){.repo-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:900px){.repo-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:1200px){.repo-grid{grid-template-columns:repeat(4,1fr)}}
.repo-card{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:12px;border:1px solid var(--border);background:var(--surface);cursor:pointer;text-decoration:none;color:inherit;transition:all .15s;height:100%}
.repo-card:hover{border-color:#d0d0d5;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.repo-card-icon{width:14px;height:14px;color:#bbb;flex-shrink:0}
.repo-card-info{min-width:0;flex:1}
.repo-card-name{font-size:14px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.repo-card-stats{display:flex;flex-wrap:wrap;gap:6px;margin-top:2px;font-size:11px;color:var(--text3)}
.add-card{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:12px;border:1px dashed #d0d0d5;background:var(--surface);cursor:pointer;text-decoration:none;color:inherit;transition:all .15s;height:100%}
.add-card:hover{border-color:var(--blue)}
.add-card-icon{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--tag-bg);flex-shrink:0}
.add-card-text{font-size:13px;color:var(--text3)}
.empty-state{text-align:center;padding:32px 20px;font-size:13px;color:var(--text3)}
.loading-state{text-align:center;padding:32px 20px;font-size:13px;color:var(--text3)}
.search-results-panel{max-width:680px;width:100%;margin:8px auto 0;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,.08);max-height:400px;overflow-y:auto;z-index:10;position:relative}
.search-results-panel .search-header{font-size:11px;color:var(--text3);padding:10px 14px 6px;border-bottom:1px solid var(--border)}
.search-results-panel .search-qid{font-weight:600;color:var(--blue)}
.search-result{padding:8px 14px;border-bottom:1px solid var(--border);transition:background .1s}
.search-result:hover{background:var(--tag-bg)}
.search-result-path{font-size:12px;color:var(--blue);cursor:pointer;font-weight:500;margin-bottom:3px}
.search-result-path:hover{text-decoration:underline}
.search-snippet{background:var(--tag-bg);border-radius:6px;padding:6px 10px;margin:4px 0 0;overflow-x:auto;font-size:11px;line-height:1.4;color:var(--text2)}
.search-snippet code{font-family:'SF Mono',Consolas,'Courier New',monospace;white-space:pre}
.search-empty{padding:20px 14px;font-size:13px;color:var(--text3);text-align:center}
.search-loading{padding:20px;text-align:center;font-size:13px;color:var(--text3)}
.fade-in{animation:fadeIn .3s ease-out both}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="main" id="mainArea">
  <div class="qa-box">
    <div class="qa-welcome">
      <div class="qa-welcome-title">OpenCodeWiki <span class="qa-welcome-sub">/ 你的代码智能问答助手</span></div>
    </div>
    <!-- QA_INPUT_HTML -->
    <div class="qa-examples">
      <button onclick="askExample('auth service 的影响范围')">auth service 的影响范围</button>
      <button onclick="askExample('kcode 和 opencodewiki 如何集成')">kcode 和 opencodewiki 如何集成</button>
      <button onclick="askExample('Explain the project architecture')">Project architecture</button>
      <button onclick="askExample('How does the data flow work?')">Data flow</button>
    </div>
  </div>

  <!-- 🔥 Team Activity -->
  <div class="team-activity" id="teamActivity">
    <div class="activity-header">📊 代码动态</div>
    <div class="activity-body" id="activityBody">
      <div class="activity-skeleton"><div class="sk" style="width:60%"></div></div>
      <div class="activity-skeleton"><div class="sk" style="width:45%"></div></div>
      <div class="activity-skeleton"><div class="sk" style="width:50%"></div></div>
    </div>
  </div>

  <div class="divider" id="repoDivider" style="display:none"></div>
  <div class="repo-section">
  <div id="repoGrid" class="repo-grid"></div>
  </div>
  <div id="loadingState" class="loading-state" style="display:none"><p>Loading repositories...</p></div>
  <div id="emptyState" class="empty-state" style="display:none"><p>No repositories found.</p></div>
</div>

<div class="redirect-overlay" id="redirectOverlay" style="display:none;position:fixed;inset:0;z-index:100;background:rgba(255,255,255,.7);backdrop-filter:blur(4px);align-items:center;justify-content:center;flex-direction:column;gap:12px">
  <div style="width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite"></div>
  <span style="font-size:14px;color:var(--text3)">Redirecting to Q&A...</span>
</div>

<style>@keyframes spin{to{transform:rotate(360deg)}}</style>

<script>
let repos = [];
const qaInput = document.getElementById('qaInput');
const qaAskBtn = document.getElementById('qaAskBtn');
const repoGrid = document.getElementById('repoGrid');
const loadingState = document.getElementById('loadingState');
const emptyState = document.getElementById('emptyState');
const repoDivider = document.getElementById('repoDivider');
const redirectOverlay = document.getElementById('redirectOverlay');
const _base = (window.BASE_PATH || '') + '/';

qaInput.addEventListener('input', function() { qaAskBtn.disabled = !this.value.trim(); autoResize(this); triggerLightweightSearch(this.value.trim()); });

// ── Input-triggered lightweight search ─────────────────────────
var searchPanel = document.createElement('div');
searchPanel.id = 'searchResultsPanel';
searchPanel.className = 'search-results-panel';
searchPanel.style.display = 'none';
qaInput.parentNode.appendChild(searchPanel);

var _lwTimer = null;

function triggerLightweightSearch(q) {
  clearTimeout(_lwTimer);
  if (q.length < 2) { searchPanel.style.display = 'none'; return; }
  _lwTimer = setTimeout(function() {
    fetch(_base + 'api/qa/lightweight-search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q, sessionId: _homeSessionId }),
    })
    .then(function(r) { if (!r.ok) throw new Error('fail'); return r.json(); })
    .then(function(data) {
      var sources = data.sources || [];
      if (sources.length === 0) { searchPanel.style.display = 'none'; return; }
      var html = '<div class="search-header">' + sources.length + ' results <span class="search-qid">#Q' + data.qid + '</span></div>';
      for (var i = 0; i < Math.min(sources.length, 8); i++) {
        var s = sources[i];
        var label = s.filePath + (s.startLine ? ':' + s.startLine : '');
        var snippet = s.snippet || '';
        html += '<div class="search-result" onclick="homeRedirectToQa(\'' + escapeHtml(q) + '\', \'' + escapeHtml(s.filePath) + '\')">' +
          '<div class="search-result-path">📄 ' + escapeHtml(label) + '</div>';
        if (snippet) {
          html += '<pre class="search-snippet"><code>' + escapeHtml(snippet.split('\n').slice(0, 4).join('\n')) + '</code></pre>';
        }
        html += '</div>';
      }
      searchPanel.innerHTML = html;
      searchPanel.style.display = 'block';
    })
    .catch(function() { searchPanel.style.display = 'none'; });
  }, 250);
}

function homeRedirectToQa(q, filePath) {
  if (!q) return;
  redirectOverlay.style.display = 'flex';
  var params = new URLSearchParams({ q: q, sessionId: _homeSessionId });
  var _dm = window.__qaSelectedDomain ? window.__qaSelectedDomain() : null;
  if (_dm) params.set('domain', _dm);
  if (filePath) params.set('file', filePath);
  setTimeout(function() { location.href = _base + 'qa?' + params.toString(); }, 150);
}

qaInput.addEventListener('keydown', function(e) { if (e.defaultPrevented) return; if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); homeRedirectToQa(qaInput.value.trim(), ''); } });
qaAskBtn.addEventListener('click', function(e) { e.preventDefault(); homeRedirectToQa(qaInput.value.trim(), ''); });

// Hide search panel when clicking outside
document.addEventListener('click', function(e) {
  if (searchPanel.style.display !== 'none' && !e.target.closest('.qa-input-wrap') && !e.target.closest('.search-results-panel')) {
    searchPanel.style.display = 'none';
  }
});

function autoResize(el) { el.style.height = 'auto'; var sh = el.scrollHeight; el.style.height = Math.min(sh, 120) + 'px'; el.style.overflowY = sh > 120 ? 'auto' : 'hidden'; }
function escapeHtml(str) { var d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

// ── File Upload (Home page) ─────────────────────────────────────
const _homeSessionId = 'ses_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
const _homeFiles = new Map();

function formatSize(bytes) {
  if (bytes < 1024) return bytes + 'B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + 'KB';
  return (bytes/1024/1024).toFixed(1) + 'MB';
}

function updateHomeChips() {
  var c = document.getElementById('fileChips');
  if (_homeFiles.size === 0) { c.style.display = 'none'; c.innerHTML = ''; return; }
  c.style.display = 'flex';
  var html = '';
  for (const [name, f] of _homeFiles) {
    html += '<div class="home-file-chip"><span class="name">' + escapeHtml(name) + '</span><span class="size">' + formatSize(f.size) + '</span><button class="rm" onclick="removeHomeFile(\'' + escapeHtml(name) + '\')">&times;</button></div>';
  }
  c.innerHTML = html;
}

function removeHomeFile(name) { _homeFiles.delete(name); updateHomeChips(); }

async function uploadHomeFile(file) {
  if (_homeFiles.has(file.name)) return;
  _homeFiles.set(file.name, { fileName: file.name, size: file.size });
  updateHomeChips();
  try {
    await fetch(_base + 'api/upload?sessionId=' + encodeURIComponent(_homeSessionId) + '&name=' + encodeURIComponent(file.name), {
      method: 'POST', headers: { 'Content-Type': 'application/octet-stream' }, body: file,
    });
    _homeFiles.set(file.name, { fileName: file.name, size: file.size, uploaded: true });
  } catch(e) { console.error('[upload]', e.message); }
}

function handleHomeFiles(files) {
  for (const f of files) uploadHomeFile(f);
  document.getElementById('fileInput').value = '';
}

/* QA_INPUT_JS */

function askExample(text) { qaInput.value = text; qaAskBtn.disabled = false; autoResize(qaInput); qaInput.focus(); }

// ── Team Activity ────────────────────────────────────────────────

async function loadTeamActivity() {
  var el = document.getElementById('teamActivity');
  var body = document.getElementById('activityBody');
  try {
    var [todayRes, calRes] = await Promise.all([
      fetch(_base + 'api/qa/entries?sort=latest&limit=5&status=active'),
      fetch(_base + 'api/qa/entries?calibrated=1&sort=latest&limit=5'),
    ]);
    var today = await todayRes.json();
    var calibrated = await calRes.json();

    var todayEntries = (today.entries || []).filter(function(e) {
      var d = new Date(e.createdAt);
      var now = new Date();
      return d.toDateString() === now.toDateString();
    });

    var rows = [];
    if (todayEntries.length > 0) {
      rows.push('<a class="activity-row" href="' + _base + 'qa?repo=' + encodeURIComponent(todayEntries[0].repo) + '">' +
        '<span class="activity-icon">💬</span>' +
        '<span class="activity-text">今日问答 <strong>' + todayEntries.length + '</strong> 条</span>' +
        '<span class="activity-meta">' + todayEntries[0].repo + ' 等</span></a>');
    } else if (today.entries && today.entries.length > 0) {
      var recent = today.entries.slice(0, 3);
      for (var ri = 0; ri < recent.length; ri++) {
        var re = recent[ri];
        var link2 = re.sessionId ? _base + 'qa/' + encodeURIComponent(re.sessionId) : _base + 'qa?qid=' + re.qid;
        rows.push('<a class="activity-row" href="' + link2 + '">' +
          '<span class="activity-icon">💬</span>' +
          '<span class="activity-text">' + escapeHtml(re.question.slice(0, 40)) + '</span>' +
          '<span class="activity-meta">' + re.repo + '</span></a>');
      }
    }
    if (calibrated.entries && calibrated.entries.length > 0) {
      var first = calibrated.entries[0];
      var calLink = first.sessionId ? _base + 'qa/' + encodeURIComponent(first.sessionId) : _base + 'qa?qid=' + first.qid;
      rows.push('<a class="activity-row" href="' + calLink + '">' +
        '<span class="activity-icon">✅</span>' +
        '<span class="activity-text">最近校准<span class="activity-meta" style="margin-left:6px">' + escapeHtml(first.question.slice(0, 30)) + '</span></span>' +
        '<span class="activity-meta">' + (calibrated.entries.length - 1 > 0 ? '等' + calibrated.entries.length + ' 条' : '') + '</span></a>');
    }

    if (rows.length === 0) { el.style.display = 'none'; return; }
    body.innerHTML = rows.join('');
    el.style.display = 'block';
  } catch { el.style.display = 'none'; }
}

// ── Repos ────────────────────────────────────────────────────────

async function fetchRepos() {
  var resp = await fetch(_base + 'api/repos');
  if (!resp.ok) throw new Error('Server returned ' + resp.status);
  return resp.json();
}

async function loadRepos() {
  loadingState.style.display = 'block';
  repoGrid.style.display = 'none';
  emptyState.style.display = 'none';
  repoDivider.style.display = 'none';
  try {
    repos = (await fetchRepos()) || [];
    renderGrid();
  } catch { loadingState.style.display = 'none'; emptyState.style.display = 'block'; emptyState.innerHTML = '<p>Could not connect to server.</p>'; }
}

function renderGrid() {
  loadingState.style.display = 'none';
  if (repos.length === 0) {
    repoGrid.style.display = 'none';
    emptyState.style.display = 'block';
    emptyState.innerHTML = '<p>No repositories found.</p>';
    return;
  }
  emptyState.style.display = 'none';
  repoDivider.style.display = 'block';
  repoGrid.style.display = 'grid';
  var html = '<div class="fade-in"><div class="add-card" onclick="toggleAnalyzer()"><div class="add-card-icon">+</div><div class="add-card-text">Add repo</div></div></div>';
  for (var i = 0; i < repos.length; i++) {
    var r = repos[i], stats = r.stats || {};
    html += '<div class="fade-in"><a href="' + _base + encodeURIComponent(r.name) + '" class="repo-card">';
    html += '<svg class="repo-card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>';
    html += '<div class="repo-card-info"><div class="repo-card-name">' + escapeHtml(r.name) + '</div>';
    html += '<div class="repo-card-stats">';
    if (stats.files != null) html += '<span>' + stats.files.toLocaleString() + ' files</span>';
    if (stats.nodes != null) html += '<span>' + stats.nodes.toLocaleString() + ' symbols</span>';
    html += '</div></div></a></div>';
  }
  repoGrid.innerHTML = html;
}

function toggleAnalyzer() {}

loadRepos();
loadTeamActivity();
document.getElementById('fileInput').addEventListener('change', function(e) { handleHomeFiles(e.target.files); });
/* USER_BAR_JS */
</script>

</body>
</html>
