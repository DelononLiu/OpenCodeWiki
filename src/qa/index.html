<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenCodeWiki Q&A</title>
<script src="/vendor/marked.min.js"></script>
<script src="/vendor/highlight.min.js"></script>
<script src="/vendor/mermaid.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
--bg-background:#ffffff;
--bg-surface:#f8f8f8;
--bg-secondary:#f0f0f0;
--bg-component:#f5f5f5;
--color-border:#d0d0d0;
--color-text-primary:#242424;
--color-text-secondary:#8f8f8f;
--color-blue:#3b82f6;
--color-purple:#a855f7;
--color-code-bg:#f6f8fa;
--color-code-text:#24292e;
--color-code-line:#6e7681;
--color-code-border:#d0d7de;
--color-input-glow:rgba(99,102,241,0.2);
--color-user-bg:#e8f0fe;
--assistant-icon:#3b82f6;
--user-icon:#6b7280;
}

.dark{
--bg-background:#141414;
--bg-surface:#181818;
--bg-secondary:#202020;
--bg-component:#252525;
--color-border:#2f2f2f;
--color-text-primary:#e4e4e4;
--color-text-secondary:#888888;
--color-blue:#6096ff;
--color-purple:#c084fc;
--color-code-bg:#0d1117;
--color-code-text:#c9d1d9;
--color-code-line:#484f58;
--color-code-border:#21262d;
--color-input-glow:rgba(96,150,255,0.25);
--color-user-bg:#1e293b;
--assistant-icon:#6096ff;
--user-icon:#888888;
}

.dark .hljs{background:transparent!important;color:var(--color-code-text)!important}
.dark pre code.hljs{color:var(--color-code-text)!important}

body{font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg-background);color:var(--color-text-primary);min-height:100vh}

.container-wrapper{width:100%;max-width:1400px;margin:0 auto;padding:0 16px}

.header{position:sticky;top:0;z-index:30;background:var(--bg-background);border-bottom:1px dashed var(--color-border)}
.header-inner{display:flex;align-items:center;justify-content:space-between;padding:14px 0}
.header-left{display:flex;align-items:center;gap:10px}
.header-left h1{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
.header-repo-name{font-size:10px;color:var(--color-text-secondary);font-weight:500;padding:2px 4px;border-radius:4px;background:var(--bg-secondary)}
.header-cross-badge{font-size:10px;color:var(--color-purple);font-weight:600;padding:2px 4px;border-radius:4px;background:var(--bg-secondary);border:1px solid var(--color-purple)}
.header-right{display:flex;align-items:center;gap:10px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;font-size:13px;cursor:pointer;border:1px solid var(--color-border);background:transparent;color:var(--color-text-primary);transition:all .15s}
.btn:hover{background:var(--bg-secondary)}
.btn-icon{border:none;padding:6px 8px;font-size:16px;line-height:1}

.main{margin-right:calc((100vw - 175px) * 0.55 + 95px);padding:0 0 140px 80px}
.main::-webkit-scrollbar{width:6px}
.main::-webkit-scrollbar-thumb{background:var(--color-border);border-radius:3px}

#messagesInner{display:flex;flex-direction:column}

.session-block{padding:28px 0 8px}

.right-panel{position:fixed;top:72px;right:80px;width:calc((100vw - 175px) * 0.55);height:calc(100vh - 72px - 100px);overflow-y:auto;z-index:10}
.right-panel::-webkit-scrollbar{width:4px}
.right-panel::-webkit-scrollbar-thumb{background:var(--color-border);border-radius:2px}
.answer-card{background:var(--bg-surface);border:0.5px solid var(--color-border);border-radius:8px;padding:16px;margin-top:12px}

.block-separator{height:1px;background:var(--color-border)}


.question-title{display:flex;align-items:center;justify-content:space-between;gap:12px}
.question-text{font-weight:700;font-size:18px;color:var(--color-text-primary);line-height:1.4}
.fast-badge{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.3px;padding:2px 8px;border-radius:999px;background:var(--bg-secondary);color:var(--color-text-secondary);white-space:nowrap;flex-shrink:0}

.answer-content{font-size:14px;line-height:1.7;word-wrap:break-word}
.answer-content .table-wrapper{overflow-x:auto;margin:10px 0}
.answer-content .table-wrapper table{margin:0;width:auto;min-width:100%}
.answer-content p{margin:8px 0}
.answer-content p:first-child{margin-top:0}
.answer-content p:last-child{margin-bottom:0}
.answer-content ul,.answer-content ol{margin:8px 0 8px 20px}
.answer-content li{margin:4px 0}
.answer-content h1,.answer-content h2,.answer-content h3,.answer-content h4{margin:14px 0 8px;font-weight:600}
.answer-content h1{font-size:17px}
.answer-content h2{font-size:15px}
.answer-content h3{font-size:14px}
.answer-content blockquote{border-left:3px solid var(--color-blue);padding:6px 14px;margin:10px 0;background:var(--bg-secondary);border-radius:0 6px 6px 0;font-size:13px}
.answer-content table{border-collapse:collapse;width:100%;margin:10px 0;font-size:13px}
.answer-content th,.answer-content td{border:1px solid var(--color-border);padding:6px 10px;text-align:left}
.answer-content th{background:var(--bg-secondary);font-weight:600}
.answer-content a{color:var(--color-blue);text-decoration:none}
.answer-content a:hover{text-decoration:underline}
a.file-ref{color:var(--color-blue);text-decoration:none;font-size:inherit;font-weight:500;cursor:pointer;white-space:nowrap;border-bottom:1px dashed var(--color-blue);padding:0 1px}
a.file-ref:hover{text-decoration:underline;border-bottom-style:solid}
.answer-content hr{border:none;border-top:1px solid var(--color-border);margin:16px 0}
.answer-content .mermaid{margin:16px 0;text-align:center}
.answer-content pre{background:var(--color-code-bg);color:var(--color-code-text);border-radius:6px;padding:12px 14px;overflow-x:auto;margin:10px 0;font-size:13px;line-height:1.5;position:relative}
.answer-content pre code{background:none;padding:0;font-size:13px;color:inherit}
.answer-content code{font-family:'SF Mono',Consolas,'Courier New',monospace;font-size:13px;background:var(--bg-secondary);padding:2px 6px;border-radius:4px;color:inherit}
.dark .answer-content code{background:var(--bg-secondary)}
.answer-content pre code{background:none!important}

.answer-actions{display:flex;justify-content:flex-end;gap:6px;padding:12px 0 4px}
.action-btn{width:30px;height:30px;border:none;background:transparent;cursor:pointer;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;color:var(--color-text-secondary);transition:all .15s}
.action-btn:hover{background:var(--bg-secondary);color:var(--color-text-primary)}
.action-btn svg{width:15px;height:15px}

.file-list-card{background:var(--bg-surface);border:0.5px solid var(--color-border);border-radius:8px}
.file-list-item{font-size:13px;color:var(--color-text-primary);user-select:none}
.file-list-item .file-item-header{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;transition:background .1s}
.file-list-item .file-item-header:hover{background:var(--bg-secondary)}
.file-list-item .expand-icon{font-size:8px;color:var(--color-text-secondary);transition:transform .15s;flex-shrink:0;width:12px;text-align:center}
.file-list-item.expanded .expand-icon{transform:rotate(90deg)}
.file-item-name{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-item-path{font-size:11px;color:var(--color-text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;flex:1}
.file-item-lines{font-size:10px;color:var(--color-text-secondary);background:var(--bg-secondary);padding:1px 7px;border-radius:8px;white-space:nowrap;flex-shrink:0}
.file-list-item+.file-list-item{margin-top:8px;border-top:0.5px solid var(--color-border)}
.file-list-item.source-highlight{background:rgba(59,130,246,0.08);border-left:3px solid var(--color-blue);border-radius:0 6px 6px 0;margin-left:-3px;padding-left:3px;transition:background 0.3s}
.dark .file-list-item.source-highlight{background:rgba(96,150,255,0.1)}
.file-list-snippet{display:none;background:var(--color-code-bg);border-top:0.5px solid var(--color-code-border)}
.file-list-empty{padding:14px;font-size:13px;color:var(--color-text-secondary);text-align:center}

.code-snippet{background:var(--color-code-bg);font-family:'SF Mono',Consolas,'Courier New',monospace;font-size:12px;line-height:1.55}
.code-expand-btn{padding:6px 14px;font-size:12px;color:var(--color-blue);cursor:pointer;border-top:0.5px solid var(--color-code-border);text-align:center;user-select:none}
.code-expand-btn:hover{background:rgba(59,130,246,.05)}
.code-line{display:flex;min-height:20px}
.code-line:hover{background:rgba(255,255,255,.03)}
.line-num{width:44px;text-align:right;padding:0 10px;color:var(--color-code-line);user-select:none;border-right:1px solid var(--color-code-border);flex-shrink:0;font-size:11px}
.line-content{padding:0 12px;white-space:pre;color:var(--color-code-text)}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 30px 60px;min-height:300px}
.empty-state h2{font-size:17px;margin-bottom:6px;font-weight:700}
.empty-state p{font-size:13px;color:var(--color-text-secondary);margin-bottom:20px}
.suggestions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.suggestions button{padding:7px 16px;border:1px solid var(--color-border);border-radius:20px;background:var(--bg-component);font-size:13px;color:var(--color-text-primary);cursor:pointer;transition:all .15s}
.suggestions button:hover{border-color:var(--color-blue);color:var(--color-blue)}

.typing-indicator{display:inline-flex;gap:5px;padding:4px 0}
.typing-indicator span{width:7px;height:7px;border-radius:50%;background:var(--color-text-secondary);animation:bounce 1.4s infinite}
.typing-indicator span:nth-child(2){animation-delay:.2s}
.typing-indicator span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-7px)}}

.bottom-bar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);width:100%;max-width:680px;z-index:20;padding:0 16px}
/* QA_INPUT_CSS */
.file-chips{display:flex;flex-wrap:wrap;gap:6px;padding:0 4px 6px 4px;max-height:80px;overflow-y:auto}
.file-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px 3px 12px;border-radius:20px;font-size:12px;background:var(--bg-secondary);border:1px solid var(--color-border);color:var(--color-text-primary);max-width:220px}
.file-chip .chip-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100px}
.file-chip .chip-size{color:var(--color-text-secondary);font-size:10px;white-space:nowrap}
.file-chip .chip-status{font-size:10px;margin-left:2px}
.file-chip .chip-remove{background:none;border:none;cursor:pointer;color:var(--color-text-secondary);padding:0 2px;font-size:14px;line-height:1;display:flex;align-items:center}
.file-chip .chip-remove:hover{color:#ef4444}
.file-chip.uploading{border-color:var(--color-blue);background:rgba(59,130,246,0.08)}
.file-chip.error{border-color:#ef4444;background:rgba(239,68,68,0.08)}
.file-chip.success{border-color:rgba(34,197,94,0.4);background:rgba(34,197,94,0.06)}
.upload-progress{height:2px;background:var(--color-border);border-radius:1px;margin:4px 8px 0;overflow:hidden}
.upload-progress-bar{height:100%;background:var(--color-blue);border-radius:1px;transition:width .2s;width:0%}
.bottom-bar.drag-over .input-box{border-color:var(--color-blue);box-shadow:0 0 0 3px var(--color-input-glow);background:rgba(59,130,246,0.04)}
.drag-hint{display:none;font-size:11px;color:var(--color-text-secondary);text-align:center;padding:2px 0 6px}
.bottom-bar.drag-over .drag-hint{display:block}

.qa-error{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:10px 14px;font-size:13px;color:#991b1b;display:flex;align-items:center;justify-content:space-between;gap:8px;margin:8px 0}
.qa-error button{background:none;border:none;color:var(--color-blue);cursor:pointer;font-size:13px;padding:0;text-decoration:underline;white-space:nowrap}
.dark .qa-error{background:#2d1b1b;border-color:#4a2525;color:#fca5a5}

@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.session-block{animation:fadeIn .25s ease-out}

@media(max-width:860px){
.right-panel{display:none}
.main{margin-right:0}
.question-text{font-size:15px}
}
</style>
</head>
<body>

<header class="header">
  <div class="container-wrapper">
    <div class="header-inner">
      <div class="header-left">
        <h1 style="color:var(--color-blue);display:inline;font-size:20px"><a href="/" style="color:inherit;text-decoration:none">OpenCodeWiki</a></h1>
        <span class="header-repo-name" id="headerRepoName"></span>
        <span class="header-cross-badge" id="headerCrossBadge" style="display:none">Cross-repo</span>
      </div>
      <div class="header-right">
        <button class="btn" onclick="goToWiki()">Wiki</button>
        <button class="btn btn-icon" id="themeToggle" onclick="toggleTheme()">&#127769;</button>
      </div>
    </div>
  </div>
</header>

<main class="main" id="mainScroll">
  <div id="messagesInner">

    <div class="empty-state" id="emptyState">
      <h2 id="emptyTitle">Ask about this codebase</h2>
      <p id="emptyDesc">I can help you understand architecture, find code, or explain how things work.</p>
      <div class="suggestions">
        <button onclick="askSuggestion('Explain the project architecture')">Project architecture</button>
        <button onclick="askSuggestion('What are the main modules?')">Main modules</button>
        <button onclick="askSuggestion('How does the data flow work?')">Data flow</button>
        <button onclick="askSuggestion('Show me key API endpoints')">Key APIs</button>
      </div>
    </div>

  </div>
</main>

<div class="right-panel" id="rightPanel">
  <div class="file-list-card">
    <div class="file-list-empty" id="fileListEmpty">No files referenced</div>
    <div id="filesGlobal"></div>
  </div>
</div>

<div class="bottom-bar" id="bottomBar">
  <div class="drag-hint" id="dragHint">&#128206; 拖放文件到此处上传</div>
  <!-- QA_INPUT_HTML -->
</div>

<script>
const messages = [];
let isLoading = false;
let abortController = null;

const messagesInner = document.getElementById('messagesInner');
const emptyState = document.getElementById('emptyState');
const form = document.getElementById('qaForm');
const input = document.getElementById('qaInput');
const sendBtn = document.getElementById('sendBtn');
const mainScroll = document.getElementById('messagesInner');
sendBtn.addEventListener('click', function(e) { sendMessage(e); });

/* QA_INPUT_JS */
function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function goToWiki() {
  location.href = currentRepo ? '/' + encodeURIComponent(currentRepo) : '/api/wiki/';
}

function scrollToBottom() {
  mainScroll.scrollTop = mainScroll.scrollHeight;
}

function scrollToElement(el) {
  if (!el) return;
  var top = window.scrollY + el.getBoundingClientRect().top - 70;
  window.scrollTo({ top: top, behavior: 'smooth' });
}

let blockCounter = 0;
let currentBlockId = null;
let currentSessionId = null;
let _globalRefCounter = 0;
const _sourceMap = {};

function createSessionBlock(question) {
  blockCounter++;
  const blockId = 'block-' + blockCounter;

  emptyState.style.display = 'none';

  const prev = messagesInner.querySelector('.session-block:last-child');
  if (prev) {
    const sep = document.createElement('div');
    sep.className = 'block-separator';
    messagesInner.appendChild(sep);
  }

  const block = document.createElement('div');
  block.className = 'session-block';
  block.id = blockId;
  block.innerHTML = `
    <div class="question-title">
      <span class="question-text">${escapeHtml(question)}</span>
      <span class="fast-badge">Fast</span>
    </div>
    <div class="answer-card">
      <div class="answer-content" id="answer-${blockId}"></div>
      <div class="answer-actions">
        <button class="action-btn" onclick="copyAnswer('${blockId}')" title="Copy answer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
        <button class="action-btn" onclick="shareBlock('${blockId}')" title="Share this Q&A">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
        </button>
      </div>
    </div>
  `;
  messagesInner.appendChild(block);
  scrollToElement(block.querySelector('.question-text'));
  return blockId;
}

function renderSnippet(snippet, maxLines) {
  if (!snippet) return '';
  maxLines = maxLines || 10;
  const allLines = snippet.split('\n');
  const showAll = allLines.length <= maxLines;
  const visibleLines = showAll ? allLines : allLines.slice(0, maxLines);

  function fmtLine(line) {
    const m = line.match(/^(\d+):\s?(.*)$/);
    if (m) {
      return '<div class="code-line"><span class="line-num">' + m[1] + '</span><span class="line-content">' + escapeHtml(m[2]) + '</span></div>';
    }
    return '<div class="code-line"><span class="line-num"></span><span class="line-content">' + escapeHtml(line) + '</span></div>';
  }

  let html = '<div class="code-snippet">';
  for (const line of visibleLines) {
    html += fmtLine(line);
  }
  if (!showAll) {
    const extraId = 'extra-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6);
    html += '<div id="' + extraId + '" style="display:none">';
    for (let i = maxLines; i < allLines.length; i++) {
      html += fmtLine(allLines[i]);
    }
    html += '</div>';
    html += '<div class="code-expand-btn" onclick="(function(){var e=document.getElementById(\'' + extraId + '\');var t=this;if(e.style.display===\'none\'){e.style.display=\'\';t.textContent=\'Show less \u25b2\';}else{e.style.display=\'none\';t.textContent=\'Show more \u25bc\';}})()">Show more \u25bc</div>';
  }
  html += '</div>';
  return html;
}

function populateFileList(blockId, sources) {
  _sourceMap[blockId] = sources;

  const container = document.getElementById('filesGlobal');
  const empty = document.getElementById('fileListEmpty');
  if (!container) return;

  if (!sources || sources.length === 0) return;
  if (empty) empty.style.display = 'none';

  // Assign globally unique ref IDs
  for (const src of sources) {
    src.refId = _globalRefCounter++;
  }

  // Filter snippet to only show lines within startLine-endLine range
  function filterSnippetLines(snippet, startLine, endLine) {
    if (!snippet || !startLine) return snippet;
    const lines = snippet.split('\n');
    const filtered = [];
    for (const line of lines) {
      const match = line.match(/^(\d+):/);
      if (match) {
        const num = parseInt(match[1], 10);
        if (num >= startLine && (!endLine || num <= endLine)) {
          filtered.push(line);
        }
      } else {
        filtered.push(line);
      }
    }
    return filtered.join('\n');
  }

  // Add block separator between question rounds (first round has no separator)
  if (container.children.length > 0) {
    const sep = document.createElement('div');
    sep.className = 'block-separator';
    container.appendChild(sep);
  }

  let html = '';
  for (let i = 0; i < sources.length; i++) {
    const src = sources[i];
    const lineLabel = src.startLine
      ? (src.endLine && src.endLine !== src.startLine ? src.startLine + '-' + src.endLine : '' + src.startLine)
      : '';
    const fid = blockId + '-f' + i;
    const sid = blockId + '-s' + i;
    const filteredSnippet = filterSnippetLines(src.snippet, src.startLine, src.endLine);
    html += '<div class="file-list-item expanded" id="' + fid + '" data-source-id="' + src.refId + '">';
    html += '<div class="file-item-header" onclick="toggleFile(\'' + fid + '\')">';
    html += '<span class="expand-icon">\u25b6</span>';
    html += '<span class="file-item-name">' + escapeHtml(src.fileName) + '</span>';
    html += '<span class="file-item-path">' + escapeHtml(src.filePath) + '</span>';
    if (lineLabel) html += '<span class="file-item-lines">' + lineLabel + '</span>';
    html += '</div>';
    html += '<div class="file-list-snippet" style="display:block" id="' + sid + '">';
    html += filteredSnippet ? renderSnippet(filteredSnippet) : '<div class="file-list-empty" style="padding:8px 14px">No preview</div>';
    html += '</div>';
    html += '</div>';
  }
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  while (tmp.firstChild) {
    container.appendChild(tmp.firstChild);
  }
}

function toggleFile(itemId) {
  const item = document.getElementById(itemId);
  if (!item) return;
  item.classList.toggle('expanded');
  const snippet = item.querySelector('.file-list-snippet');
  if (snippet) {
    snippet.style.display = snippet.style.display === 'block' ? 'none' : 'block';
  }
}

function setTyping(typing) {
  const existing = document.getElementById('assistantTyping');
  if (existing) existing.remove();
  if (!typing || !currentBlockId) return;

  const answerEl = document.getElementById('answer-' + currentBlockId);
  if (!answerEl) return;
  const indicator = document.createElement('div');
  indicator.className = 'typing-indicator';
  indicator.id = 'assistantTyping';
  indicator.innerHTML = '<span></span><span></span><span></span>';
  answerEl.appendChild(indicator);
}

function navigateToSource(blockId, refId) {
  const panel = document.getElementById('rightPanel');
  const fileItem = document.getElementById('filesGlobal').querySelector('.file-list-item[data-source-id="' + refId + '"]');
  console.log('[nav] refId=' + refId + ' found=', !!fileItem, 'label=', fileItem?.querySelector('.file-item-name')?.textContent, 'lines=', fileItem?.querySelector('.file-item-lines')?.textContent);
  if (!fileItem) return false;

  fileItem.classList.add('source-highlight');
  const snippet = fileItem.querySelector('.file-list-snippet');
  if (snippet) snippet.style.display = 'block';
  fileItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  setTimeout(function() {
    fileItem.classList.remove('source-highlight');
  }, 3000);
  return false;
}

function processFileRefs(rootEl, blockId) {
  const sources = _sourceMap[blockId];
  if (!sources || sources.length === 0) { console.log('[qa] pf no sources', { blockId, mapKeys: Object.keys(_sourceMap) }); return; }

  const pathLookup = {};
  const nameLookup = {};
  for (const src of sources) {
    const id = src.refId ?? 0;
    var addKey = function(map, key) { if (key) map[key] = id; };
    if (src.filePath) {
      addKey(pathLookup, src.filePath + ':' + src.startLine);
      if (src.endLine && src.endLine !== src.startLine) {
        addKey(pathLookup, src.filePath + ':' + src.startLine + '-' + src.endLine);
      }
    }
    if (src.fileName) {
      addKey(nameLookup, src.fileName + ':' + src.startLine);
      if (src.endLine && src.endLine !== src.startLine) {
        addKey(nameLookup, src.fileName + ':' + src.startLine + '-' + src.endLine);
      }
    }
  }
  console.log('[qa] pf lookup keys', { pathKeys: Object.keys(pathLookup).length, nameKeys: Object.keys(nameLookup).length, samplePath: Object.keys(pathLookup)[0] });

  var FILE_REF_RE = /(?:([\w-]+):)?([\w./-]+\.[a-zA-Z][\w.-]*):(\d+)(?:-(\d+))?/g;

  var walker = document.createTreeWalker(rootEl, NodeFilter.SHOW_TEXT, null);
  var textNodes = [];
  while (walker.nextNode()) {
    textNodes.push(walker.currentNode);
  }
  console.log('[qa] pf text node count', textNodes.length);

  var matchCount = 0;
  for (const textNode of textNodes) {
    var sample = textNode.textContent.slice(0, 200);
    var matches = [];
    var m;
    FILE_REF_RE.lastIndex = 0;
    while ((m = FILE_REF_RE.exec(textNode.textContent)) !== null) {
      matches.push(m[0]);
    }
    if (matches.length > 0) console.log('[qa] pf regex matches in text', { sample: sample, matches: matches.slice(0, 3) });

    const html = textNode.textContent.replace(FILE_REF_RE, function(match, repoName, filePath, line, endLine) {
      var lineSuffix = endLine ? line + '-' + endLine : line;
      var refId = null;

      if (repoName) {
        refId = pathLookup[repoName + ':' + filePath + ':' + lineSuffix];
        if (refId == null) {
          var fileName = filePath.split('/').pop();
          refId = nameLookup[repoName + ':' + fileName + ':' + lineSuffix];
        }
      }

      if (refId == null) {
        refId = pathLookup[filePath + ':' + lineSuffix];
      }
      if (refId == null) {
        var fileName = filePath.split('/').pop();
        refId = nameLookup[fileName + ':' + lineSuffix];
      }

      if (refId == null) {
        console.log('[qa] pf no refId', { match: match, repoName: repoName, filePath: filePath, line: line });
        return match;
      }

      matchCount++;
      var displayBase = filePath;
      var displayPrefix = '';
      if (repoName) {
        displayPrefix = repoName + ':';
      }
      var displayName = displayPrefix + (displayBase.split('/').pop() || displayBase);
      var displayText = displayName + ':' + line + (endLine ? '-' + endLine : '');
      return '<a class="file-ref" href="javascript:void(0)" onclick="return navigateToSource(\'' + blockId + '\', ' + refId + ')" data-source-id="' + displayName + '">' + displayText + '</a>';
    });
    var span = document.createElement('span');
    span.innerHTML = html;
    textNode.parentNode.replaceChild(span, textNode);
  }
  console.log('[qa] pf matchCount', matchCount);
}

function updateAnswerContent(blockId, content) {
  const answerEl = document.getElementById('answer-' + blockId);
  if (!answerEl) return;

  const typingIndicator = document.getElementById('assistantTyping');
  if (typingIndicator) typingIndicator.remove();

  answerEl.innerHTML = marked.parse(content);
  answerEl.querySelectorAll('table').forEach(function(tbl) {
    if (tbl.parentNode.classList?.contains('table-wrapper')) return;
    var wrapper = document.createElement('div');
    wrapper.className = 'table-wrapper';
    tbl.parentNode.insertBefore(wrapper, tbl);
    wrapper.appendChild(tbl);
  });
  try { processFileRefs(answerEl, blockId); } catch(e) { console.error('[qa] processFileRefs error', e); }
  try {
    answerEl.querySelectorAll('pre code').forEach((block) => {
      hljs.highlightElement(block);
    });
  } catch(e) { console.error('[qa] highlight error', e); }
  // Convert mermaid code blocks into rendered diagrams
  answerEl.querySelectorAll('pre code.language-mermaid').forEach(function(block) {
    var pre = block.parentElement;
    var div = document.createElement('div');
    div.className = 'mermaid';
    div.textContent = block.textContent;
    pre.parentElement.replaceChild(div, pre);
  });
  try { mermaid.run({ querySelector: '.answer-content .mermaid' }); } catch(e) { console.error('[qa] mermaid error', e); }
}

function updateSendBtn() {
  sendBtn.disabled = isLoading || !input.value.trim();
}

function showError(msg) {
  emptyState.style.display = 'none';
  const div = document.createElement('div');
  div.className = 'qa-error';
  div.innerHTML = '<span>' + escapeHtml(msg) + '</span><button onclick="this.parentElement.remove()">Dismiss</button>';
  const lastBlock = messagesInner.querySelector('.session-block:last-child');
  if (lastBlock) {
    lastBlock.after(div);
  } else {
    messagesInner.appendChild(div);
  }
  scrollToBottom();
}

function setLoading(loading) {
  isLoading = loading;
  input.disabled = loading;

function autoResize() {
  input.style.height = 'auto';
  var sh = input.scrollHeight;

// ── File Upload Management ──────────────────────────────────────────
const _attachedFiles = new Map(); // fileName → { fileName, size, uploaded }

function formatFileSize(bytes) {
  if (bytes < 1024) return bytes + 'B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + 'KB';
  return (bytes / 1024 / 1024).toFixed(1) + 'MB';
}

function updateFileChips() {
  const container = document.getElementById('fileChips');
  if (_attachedFiles.size === 0) { container.innerHTML = ''; return; }
  let html = '';
  for (const [name, f] of _attachedFiles) {
    const statusIcon = f.uploaded ? '' : ' &#8987;';
    const statusClass = f.uploaded ? 'success' : 'uploading';
    html += '<div class="file-chip ' + statusClass + '" title="' + escapeHtml(name) + '">' +
      '<span class="chip-name">' + escapeHtml(name) + '</span>' +
      '<span class="chip-size">' + formatFileSize(f.size) + '</span>' +
      '<span class="chip-status">' + statusIcon + '</span>' +
      '<button class="chip-remove" onclick="removeFile(\'' + escapeHtml(name) + '\')" title="Remove">&#x2715;</button>' +
      '</div>';
  }
  container.innerHTML = html;
}

function removeFile(name) {
  _attachedFiles.delete(name);
  updateFileChips();
  const dt = _dataTransfer;
  if (dt) {
    // Rebuild FileList by filtering
    const newFiles = Array.from(dt.files).filter(f => f.name !== name);
    const newDt = new DataTransfer();
    newFiles.forEach(f => newDt.items.add(f));
    _dataTransfer = newDt;
    document.getElementById('fileInput').files = newDt.files;
  }
}

let _dataTransfer = null;

async function uploadFile(file) {
  const name = file.name;
  if (_attachedFiles.has(name) && _attachedFiles.get(name).uploaded) return;

  _attachedFiles.set(name, { fileName: name, size: file.size, uploaded: false });
  updateFileChips();

  // Need a sessionId to upload — create one if QA hasn't started yet
  const sid = currentSessionId || ('ses_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8));

  try {
    if (file.size > 10 * 1024 * 1024) {
      const CHUNK_SIZE = 5 * 1024 * 1024;
      const totalChunks = Math.ceil(file.size / CHUNK_SIZE);
      const startResp = await fetch('/api/upload/chunked/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId: sid, fileName: name, totalChunks }),
      });
      if (!startResp.ok) throw new Error('Failed to start chunked upload');
      const { uploadId } = await startResp.json();

      for (let i = 0; i < totalChunks; i++) {
        const start = i * CHUNK_SIZE;
        const end = Math.min(start + CHUNK_SIZE, file.size);
        const chunk = file.slice(start, end);
        const chunkResp = await fetch('/api/upload/chunked/' + uploadId + '/' + i + '?sessionId=' + encodeURIComponent(sid), {
          method: 'POST',
          headers: { 'Content-Type': 'application/octet-stream' },
          body: chunk,
        });
        if (!chunkResp.ok) throw new Error('Chunk ' + i + ' failed');
      }

      const completeResp = await fetch('/api/upload/chunked/complete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId: sid, uploadId, fileName: name }),
      });
      if (!completeResp.ok) throw new Error('Failed to complete upload');
    } else {
      const resp = await fetch('/api/upload?sessionId=' + encodeURIComponent(sid) + '&name=' + encodeURIComponent(name), {
        method: 'POST',
        headers: { 'Content-Type': 'application/octet-stream' },
        body: file,
      });
      if (!resp.ok) throw new Error('Upload failed');
    }

    _attachedFiles.set(name, { fileName: name, size: file.size, uploaded: true });
    updateFileChips();
  } catch (e) {
    _attachedFiles.set(name, { fileName: name, size: file.size, uploaded: false });
    updateFileChips();
    console.error('[upload] failed:', name, e.message);
  }
}

async function handleFilesSelected(files) {
  if (!files || files.length === 0) return;
  if (!_dataTransfer) _dataTransfer = new DataTransfer();
  for (const file of files) {
    _dataTransfer.items.add(file);
    uploadFile(file);
  }
  document.getElementById('fileInput').value = '';
}

// Drag-and-drop
const bottomBar = document.getElementById('bottomBar');
bottomBar.addEventListener('dragover', function(e) {
  e.preventDefault();
  bottomBar.classList.add('drag-over');
});
bottomBar.addEventListener('dragleave', function(e) {
  e.preventDefault();
  bottomBar.classList.remove('drag-over');
});
bottomBar.addEventListener('drop', function(e) {

  }
});

async function sendMessage(e) {
  e.preventDefault();
  const text = input.value.trim();
  if (!text || isLoading) return;
  input.value = '';
  input.style.height = 'auto';
  updateSendBtn();

  // Collect attached files for the API request
  const attachedSnapshot = [];
  for (const [name, f] of _attachedFiles) {
    if (f.uploaded) attachedSnapshot.push({ fileName: name, size: f.size });
  }
  // Clear chips after snapshot
  _attachedFiles.clear();
  updateFileChips();

  messages.push({ role: 'user', content: text });

  currentBlockId = createSessionBlock(text);
  setLoading(true);
  abortController = new AbortController();
  let assistantContent = '';

  try {
    const payload = { question: text, history: messages.slice(0, -1), repo: currentRepo, sessionId: currentSessionId };
    var _st = window.__qaSelectedType ? window.__qaSelectedType() : null;
    if (_st) payload.questionType = _st;
    if (attachedSnapshot.length > 0) {
      payload.attachedFiles = attachedSnapshot;
    }
    const resp = await fetch('/api/qa', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      signal: abortController.signal,
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ error: 'Request failed' }));
      showError(err.error || 'Request failed');
      setLoading(false);
      return;
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed || !trimmed.startsWith('data: ')) continue;
        try {
          const data = JSON.parse(trimmed.slice(6));
          if (data.type === 'session') {
            currentSessionId = data.id;
            const sessionUrl = '/qa/' + currentSessionId;
            history.replaceState(null, '', sessionUrl);
            console.log('[qa] session', data.id);
          } else if (data.type === 'sources') {
            console.log('[qa] sources event', { count: data.sources?.length, first: data.sources?.[0]?.filePath, currentRepo: currentRepo });
            if (currentBlockId) {
              populateFileList(currentBlockId, data.sources);
              processFileRefs(document.getElementById('answer-' + currentBlockId), currentBlockId);
            } else {
              setTimeout(() => {
                const lastBlock = messagesInner.querySelector('.session-block:last-child');
                if (lastBlock) {
                  populateFileList(lastBlock.id, data.sources);
                  processFileRefs(document.getElementById('answer-' + lastBlock.id), lastBlock.id);
                }
              }, 100);
            }
          } else if (data.type === 'token') {
            assistantContent += data.content;
            updateAnswerContent(currentBlockId, assistantContent);
          } else if (data.type === 'error') {
            showError(data.message || 'An error occurred');
          } else if (data.type === 'done') {
          }
        } catch (e) {
        }
      }
    }

    if (assistantContent) {
      messages.push({ role: 'assistant', content: assistantContent });
    }
  } catch (err) {
    if (err.name !== 'AbortError') {
      showError(err.message || 'Network error');
    }
  } finally {
    setLoading(false);
    abortController = null;
    currentBlockId = null;
  }
}

function clearChat() {
  messages.length = 0;
  currentBlockId = null;
  currentSessionId = null;
  blockCounter = 0;
  _globalRefCounter = 0;
  messagesInner.querySelectorAll('.session-block, .block-separator, .qa-error').forEach(function(el) { el.remove(); });
  var filesEl = document.getElementById('filesGlobal');
  if (filesEl) filesEl.innerHTML = '';
  var emptyEl = document.getElementById('fileListEmpty');
  if (emptyEl) emptyEl.style.display = '';
  emptyState.style.display = '';
  input.value = '';
  input.style.height = 'auto';
  updateSendBtn();
  input.focus();
  history.replaceState(null, '', '/qa');
}

function askSuggestion(text) {
  input.value = text;
  updateSendBtn();
  sendMessage(new Event('submit', { cancelable: true }));
}

function copyAnswer(blockId) {
  const answerEl = document.getElementById('answer-' + blockId);
  if (!answerEl) return;
  try {
    navigator.clipboard.writeText(answerEl.textContent);
  } catch {}
}

function shareBlock(blockId) {
  const block = document.getElementById(blockId);
  if (!block) return;
  const url = currentSessionId
    ? location.origin + '/qa/' + currentSessionId
    : location.href;
  try {
    navigator.clipboard.writeText(url);
  } catch {}
}

function toggleTheme() {
  const html = document.documentElement;
  const btn = document.getElementById('themeToggle');
  if (html.classList.contains('dark')) {
    html.classList.remove('dark');
    btn.textContent = '\u{1F319}';
    localStorage.setItem('qaTheme', 'light');
  } else {
    html.classList.add('dark');
    btn.textContent = '\u2600\uFE0F';
    localStorage.setItem('qaTheme', 'dark');
  }
}

input.addEventListener('input', updateSendBtn);
input.addEventListener('input', autoResize);
input.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage(e);
  }
});

const savedTheme = localStorage.getItem('qaTheme');
if (savedTheme === 'dark') {
  document.documentElement.classList.add('dark');
  document.getElementById('themeToggle').textContent = '\u2600\uFE0F';
}

mermaid.initialize({ startOnLoad: false, theme: 'neutral', securityLevel: 'loose' });

const pathRepoMatch = location.pathname.match(/^\/(?!qa\b)([^/]+)\/qa/);
let currentRepo = pathRepoMatch?.[1] || new URLSearchParams(location.search).get('repo') || undefined;
const headerRepoName = document.getElementById('headerRepoName');
const headerCrossBadge = document.getElementById('headerCrossBadge');
if (currentRepo) { headerRepoName.textContent = currentRepo; headerRepoName.style.display = ''; headerCrossBadge.style.display = 'none'; document.title = currentRepo + ' — OpenCodeWiki Q&A'; document.getElementById('qaInput').placeholder = currentRepo + ' 相关问题...'; }
else { headerRepoName.style.display = 'none'; headerCrossBadge.style.display = 'inline'; document.title = 'OpenCodeWiki Q&A (Cross-repo)'; document.getElementById('emptyTitle').textContent = 'Ask across all repositories'; document.getElementById('emptyDesc').textContent = 'I can search across all indexed codebases to find answers.'; }

const sessionMatch = location.pathname.match(/^\/qa\/([^/]+)/);
const currentSessionIdFromUrl = sessionMatch?.[1] || new URLSearchParams(location.search).get('sessionId') || null;

async function restoreSession(sessionId) {
  currentSessionId = sessionId;
  try {
    const resp = await fetch('/api/qa/session/' + sessionId);
    if (!resp.ok) return;
    const session = await resp.json();
    if (!session.messages || session.messages.length === 0) return;
    if (session.repo) { currentRepo = session.repo; headerRepoName.textContent = session.repo; headerRepoName.style.display = ''; headerCrossBadge.style.display = 'none'; document.getElementById('qaInput').placeholder = session.repo + ' 相关问题...'; document.title = session.repo + ' — OpenCodeWiki Q&A'; }
    let lastBlockId = null;
    for (let i = 0; i < session.messages.length; i += 2) {
      const userMsg = session.messages[i];
      const asstMsg = session.messages[i + 1];
      if (userMsg?.role !== 'user') continue;
      const blockId = createSessionBlock(userMsg.content);
      lastBlockId = blockId;
      if (asstMsg?.role === 'assistant') {
        updateAnswerContent(blockId, asstMsg.content);
      }
    }
    for (const m of session.messages) {
      messages.push(m);
    }
    if (session.sources && session.sources.length > 0 && lastBlockId) {
      populateFileList(lastBlockId, session.sources);
      processFileRefs(document.getElementById('answer-' + lastBlockId), lastBlockId);
    }
  } catch {}
}

// Redirect bare /qa (no question, no session) to home
const qParams = new URLSearchParams(location.search);
if (!qParams.get('q') && !qParams.get('repo') && !currentSessionIdFromUrl) {
  location.href = '/';
}

if (currentSessionIdFromUrl) {
  restoreSession(currentSessionIdFromUrl);
}

const initialQ = qParams.get('q');
if (initialQ) {
  input.value = initialQ;
  updateSendBtn();
  sendMessage(new Event('submit', { cancelable: true }));
}
